name: DevOps Capstone CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      FRONTEND_REPO: ${{ secrets.FRONTEND_ECR_REPO }}
      BACKEND_REPO: ${{ secrets.BACKEND_ECR_REPO }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image Tag
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Frontend Image
        run: |
          docker build \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:$IMAGE_TAG \
            -f app-repo/frontend/Dockerfile app-repo/frontend

      - name: Build Backend Image
        run: |
          docker build \
          -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:$IMAGE_TAG \
          -f app-repo/backend/Dockerfile \
          app-repo/backend



      - name: Push Frontend Image
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:$IMAGE_TAG

      - name: Push Backend Image
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:$IMAGE_TAG

      - name: Update Helm Values
        run: |
          sed -i -E "s/tag: .*/tag: ${IMAGE_TAG}/" app-repo/helm/capstone-app/values-dev.yaml

      - name: Commit Updated Helm Values
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add app-repo/helm/capstone-app/values-dev.yaml

          git diff --cached --quiet || git commit -m "Update image tag to ${IMAGE_TAG}"

          git push
